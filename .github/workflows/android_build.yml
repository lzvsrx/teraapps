name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          git \
          python3-dev \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          libffi-dev \
          libssl-dev \
          openjdk-17-jdk \
          zip \
          unzip \
          autoconf \
          libtool \
          pkg-config \
          cmake \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Cython==0.29.33
        pip install buildozer
        pip install pillow

    - name: Build with Buildozer
      run: |
        yes | buildozer android debug
      env:
        BUILDOZER_ALLOW_ORG_NAME_START: 1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: tera-app-debug
        path: bin/*.apk

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: bin/*.apk
        name: Release ${{ github.ref_name }}
        body: "Build automático do Agente Tera para Android."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
